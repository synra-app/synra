packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  "@capacitor/android": ^8.3.0
  "@capacitor/cli": ^8.3.0
  "@capacitor/core": ^8.3.0
  "@capacitor/ios": ^8.3.0
  "@types/node": ^25.6.0
  typescript: ^6.0.2
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
